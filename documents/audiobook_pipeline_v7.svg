<svg width="100%" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }
    .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th    { fill: #085041; } .c-teal .ts  { fill: #0F6E56; }
    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th   { fill: #633806; } .c-amber .ts { fill: #854F0B; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; } .c-purple .ts{ fill: #534AB7; }
    .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th    { fill: #0C447C; } .c-blue .ts  { fill: #185FA5; }
    .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th   { fill: #712B13; } .c-coral .ts { fill: #993C1D; }
    .c-green rect  { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th   { fill: #27500A; } .c-green .ts { fill: #3B6D11; }
    .c-pink rect   { fill: #FBEAF0; stroke: #993556; }
    .c-pink .th    { fill: #72243E; } .c-pink .ts  { fill: #993556; }
  </style>
</defs>

<!-- 1. Input -->
<g class="c-gray">
  <rect x="190" y="20" width="300" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">小説テキスト（全文）</text>
</g>
<line x1="340" y1="64" x2="340" y2="84" class="arr" marker-end="url(#arrow)"/>

<!-- 2. Preprocessing -->
<g class="c-teal">
  <rect x="190" y="84" width="300" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="102" text-anchor="middle" dominant-baseline="central">前処理・セリフ分離</text>
  <text class="ts" x="340" y="122" text-anchor="middle" dominant-baseline="central">章分割・話者タグ付け・地の文識別</text>
</g>

<!-- T-split: event master left, full-text scan center -->
<path d="M340,140 L340,150 L100,150 L100,162" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340,150 L340,162" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 3a. Event master -->
<g class="c-coral">
  <rect x="24" y="162" width="152" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="100" y="180" text-anchor="middle" dominant-baseline="central">事象マスタ定義</text>
  <text class="ts" x="100" y="198" text-anchor="middle" dominant-baseline="central">場面ごとに事象を登録</text>
  <text class="ts" x="100" y="216" text-anchor="middle" dominant-baseline="central">（知識DBループで参照）</text>
</g>

<!-- 3b. Full-text scan -->
<g class="c-amber">
  <rect x="190" y="162" width="300" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="180" text-anchor="middle" dominant-baseline="central">全文スキャン（一度だけ実行）</text>
  <text class="ts" x="340" y="198" text-anchor="middle" dominant-baseline="central">全セリフ一括Embedding・クラスタ初期化</text>
  <text class="ts" x="340" y="216" text-anchor="middle" dominant-baseline="central">Path Bのベースラインを確定</text>
</g>

<!-- T-split from full-text scan → two parallel containers -->
<path d="M340,230 L340,242 L182,242 L182,252" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340,242 L498,242 L498,252" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Event master dashed reference -->
<path d="M100,230 L100,260 L182,260 L182,278" fill="none" stroke-dasharray="4 3" stroke-width="1" stroke="#aaa" marker-end="url(#arrow)"/>

<!-- LEFT CONTAINER: 第1パス 知識DBループ -->
<rect x="28" y="252" width="308" height="226" rx="10" fill="none" stroke-dasharray="6 4" stroke-width="1.2" stroke="#888"/>
<text class="ts" x="182" y="267" text-anchor="middle">第1パス：知識DBループ（全文）</text>

<g class="c-blue">
  <rect x="40" y="278" width="284" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="182" y="296" text-anchor="middle" dominant-baseline="central">知識DB更新（全章ループ）</text>
  <text class="ts" x="182" y="314" text-anchor="middle" dominant-baseline="central">事象マスタ参照・登場→知得→フラグ付与</text>
</g>
<line x1="182" y1="330" x2="182" y2="342" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Knowledge detail dashed -->
<rect x="40" y="342" width="284" height="38" rx="6" fill="none" stroke-dasharray="3 2" stroke-width="0.8" stroke="#aaa"/>
<text class="ts" x="182" y="356" text-anchor="middle" dominant-baseline="central">事象マスタ × キャラクター知識状態</text>
<text class="ts" x="182" y="372" text-anchor="middle" dominant-baseline="central">登場 ≠ 知った（場面ごとに個別判定）</text>
<line x1="182" y1="380" x2="182" y2="392" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g class="c-coral">
  <rect x="40" y="392" width="284" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="182" y="410" text-anchor="middle" dominant-baseline="central">遡及検出・過去エントリ修正</text>
  <text class="ts" x="182" y="428" text-anchor="middle" dominant-baseline="central">「前から知っていた」をDB遡及修正</text>
</g>
<text class="ts" x="182" y="462" text-anchor="middle">→ 知識DB確定（全文処理完了後）</text>

<!-- RIGHT CONTAINER: 性格履歴ループ -->
<rect x="344" y="252" width="308" height="226" rx="10" fill="none" stroke-dasharray="6 4" stroke-width="1.2" stroke="#888"/>
<text class="ts" x="498" y="267" text-anchor="middle">性格履歴ループ（章ごと逐次・独立）</text>

<g class="c-purple">
  <rect x="356" y="278" width="138" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="425" y="296" text-anchor="middle" dominant-baseline="central">Path A：LLM要約</text>
  <text class="ts" x="425" y="314" text-anchor="middle" dominant-baseline="central">行動観察ベース逐次更新</text>
</g>

<g class="c-blue">
  <rect x="502" y="278" width="138" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="571" y="296" text-anchor="middle" dominant-baseline="central">Path B：Embedding</text>
  <text class="ts" x="571" y="314" text-anchor="middle" dominant-baseline="central">重心・分散を逐次更新</text>
</g>

<!-- Merge A+B → fusion -->
<line x1="425" y1="330" x2="425" y2="344" stroke="#888" stroke-width="1.5" fill="none"/>
<line x1="571" y1="330" x2="571" y2="344" stroke="#888" stroke-width="1.5" fill="none"/>
<line x1="425" y1="344" x2="571" y2="344" stroke="#888" stroke-width="1.5" fill="none"/>
<line x1="498" y1="344" x2="498" y2="360" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="356" y="360" width="284" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="498" y="378" text-anchor="middle" dominant-baseline="central">矛盾検出・統合</text>
  <text class="ts" x="498" y="396" text-anchor="middle" dominant-baseline="central">当該章時点の性格状態を確定</text>
</g>
<text class="ts" x="498" y="422" text-anchor="middle">観察行動ベース・知識DB非依存</text>
<text class="ts" x="498" y="444" text-anchor="middle">→ 性格履歴を章ごとに逐次蓄積</text>

<!-- Arrows into Pass 2 -->
<line x1="182" y1="478" x2="182" y2="498" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="498" y1="478" x2="498" y2="498" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="182" y="492" text-anchor="middle">知識DB参照</text>
<text class="ts" x="498" y="492" text-anchor="middle">性格履歴参照</text>

<!-- PASS 2: TTSパラメタ生成ループ -->
<rect x="28" y="500" width="624" height="218" rx="10" fill="none" stroke-dasharray="6 4" stroke-width="1.2" stroke="#888"/>
<text class="ts" x="340" y="516" text-anchor="middle">第2パス：TTSパラメタ生成ループ（性格履歴・知識DBを参照）</text>

<!-- Scene sub-loop -->
<rect x="40" y="522" width="600" height="178" rx="8" fill="none" stroke-dasharray="3 3" stroke-width="1" stroke="#aaa"/>
<text class="ts" x="340" y="536" text-anchor="middle">場面ごとのサブループ</text>

<g class="c-pink">
  <rect x="52" y="544" width="240" height="46" rx="8" stroke-width="0.5"/>
  <text class="th" x="172" y="562" text-anchor="middle" dominant-baseline="central">心情層の更新（場面単位）</text>
  <text class="ts" x="172" y="580" text-anchor="middle" dominant-baseline="central">場面の出来事から感情ベクトルを更新</text>
</g>
<line x1="172" y1="590" x2="172" y2="604" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<g class="c-green">
  <rect x="52" y="604" width="576" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="622" text-anchor="middle" dominant-baseline="central">セリフごとのTTSパラメタ推定</text>
  <text class="ts" x="340" y="644" text-anchor="middle" dominant-baseline="central">性格履歴（章確定）× 知識DB（全文確定）× 心情層（場面推定）を統合</text>
</g>

<!-- Pass 2 exit -->
<line x1="340" y1="718" x2="340" y2="738" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- TTS Params -->
<g class="c-green">
  <rect x="190" y="738" width="300" height="58" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="757" text-anchor="middle" dominant-baseline="central">TTSパラメタ出力（JSON）</text>
  <text class="ts" x="340" y="779" text-anchor="middle" dominant-baseline="central">性格・心情・知識制御フラグを統合した音声パラメタ</text>
</g>
<line x1="340" y1="796" x2="340" y2="816" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- External TTS -->
<g class="c-gray">
  <rect x="190" y="816" width="300" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="838" text-anchor="middle" dominant-baseline="central">External TTS（音声生成）</text>
</g>

</svg>
